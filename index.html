    .hero {

/* Text panel (premium glass feel) */
.hero-text-panel {
    width: 45%;
    z-index: 2;
    padding: 40px;
    border-radius: 16px;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.35);

    animation: heroFadeIn 1.2s ease forwards;
    opacity: 0;
    transform: translateY(20px);
}

.hero-title {
    font-size: 3.5rem;
    margin-bottom: 15px;
}

/* Subtext */
.subtext p {
    margin: 6px 0;
    opacity: 0.7;
}
/* Video side */
.hero-video {
    position: absolute;
    right: 0;
    top: 0;
    width: 60%;
    height: 100%;
    overflow: hidden;
}

/* Cinematic video zoom */
.hero-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.1);
    animation: videoZoom 20s linear infinite;
}

/* Cinematic fade mask */
.hero-video::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 70%;
    height: 100%;
    background: linear-gradient(
        to right,
        #0f0f0f 0%,
        rgba(15,15,15,0.85) 35%,
        rgba(15,15,15,0) 100%
    );
}

/* Animations */
@keyframes heroFadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes videoZoom {
    0% { transform: scale(1.1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1.1); }
}    
.hero {
    position: relative;
    display: flex;
    align-items: center;
    min-height: 90vh;
    padding: 0 10%;
    overflow: hidden;
}

/* Text Panel */
.hero-text-panel {
    position: relative;
    width: 45%;
    padding: 50px;
    border-radius: 20px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    z-index: 3;

    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.2s ease forwards;
}

.hero-title {
    font-size: 3.8rem;
    margin-bottom: 20px;
}

.subtext p {
    margin: 6px 0;
    opacity: 0.75;
}

/* Video */
.hero-video {
    position: absolute;
    right: 0;
    top: 0;
    width: 65%;
    height: 100%;
    overflow: hidden;
}

.hero-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.15);
    animation: slowZoom 25s ease-in-out infinite;
}

/* Cinematic Fade */
.hero-video::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 75%;
    height: 100%;
    background: linear-gradient(
        to right,
        #0a0a0a 0%,
        rgba(10,10,10,0.9) 35%,
        rgba(10,10,10,0) 100%
    );
}

/* Subtle film grain overlay */
.hero-overlay {
    position: absolute;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
    opacity: 0.05;
    z-index: 2;
    pointer-events: none;
}

/* Animations */
@keyframes slowZoom {
    0% { transform: scale(1.15); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1.15); }
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ========================= */

@media (max-width: 768px) {

    .hero-video {

    .hero-video video {
        width: 100%;
        height: 100%;

        transform: scale(1.1);

    }

    /* Stronger cinematic fade */
    .hero-video::after {
        content: "";

<script>
const heroText = document.querySelector('.hero-text-panel');

document.addEventListener('mousemove', (e) => {
    const x = (window.innerWidth / 2 - e.clientX) / 50;
    const y = (window.innerHeight / 2 - e.clientY) / 50;

    heroText.style.transform = `translate(${x}px, ${y}px)`;
